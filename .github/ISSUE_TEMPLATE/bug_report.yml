name: Bug 报告
description: 客户端、文档或仓库工具的可复现问题
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        请先阅读 [CONTRIBUTING.md](https://github.com/SynSwarm/shuxin/blob/main/CONTRIBUTING.md) 中的仓库边界。网关后端在**私有仓库**，本仓 Issue 请聚焦 iOS / 文档 / 契约摘要。
  - type: textarea
    id: summary
    attributes:
      label: 现象摘要
      description: 一句话说明出了什么问题。
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 从打开应用到触发问题的最小步骤。
      placeholder: "1. …\n2. …"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: 环境（如适用）
      description: 例如 iOS 版本、Xcode 版本、分支或 commit。
  - type: textarea
    id: extra
    attributes:
      label: 截图 / 日志（脱敏）
      description: 请勿粘贴令牌、Cookie 或密钥。
